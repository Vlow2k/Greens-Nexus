name: Deploy static site to GitHub Pages (official actions)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to GitHub Pages (JamesIves action)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/scratch/master-construction-portal
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
